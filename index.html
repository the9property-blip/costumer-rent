<style>

body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f4f8; color: #1a202c; padding: 14px; font-size: 15px; }

.field label { font-size: 12px; color: #4a5568; font-weight: 700; margin-bottom: 4px; }

<div class="header">
  <h1>👥 ฐานข้อมูลลูกค้าหาเช่า</h1>
  <div class="sub" id="sub-line">ลูกค้าที่ติดต่อเข้ามาแต่ยังไม่ได้บ้าน — ติดตามจนปิดการเช่า</div>
  <div class="header-actions">
    <button class="btn" onclick="loadData()">🔄 โหลดข้อมูล</button>
    <button class="btn btn-add" id="addBtn" onclick="openAdd()">➕ เพิ่มลูกค้าใหม่</button>
    <a class="btn-link" id="catalogLink" href="#" target="_blank" rel="noopener" style="display:none">🏠 แคทตาลอกเช่า</a>
    <button class="btn btn-ghost" id="authBtn" onclick="authBtnClick()">🔒 ล็อกอินทีมงาน</button>
  </div>
</div>

<div id="lockBanner" class="lock-banner" style="display:none">
  <span class="lic">🔒</span>
  ข้อมูลลูกค้าเป็นความลับ — กรุณาล็อกอินทีมงานก่อนจึงจะเห็นรายชื่อลูกค้า
  <br><button class="lock-banner-btn" onclick="openLogin()">เข้าสู่ระบบทีมงาน</button>
</div>

<div id="toolbar" class="toolbar" style="display:none">
  <div class="chips" id="chips"></div>
  <div class="search-row">
    <input id="searchInput" type="text" placeholder="🔍 ค้นหา ชื่อ / เบอร์ / สัญชาติ / ทำเล / หมายเหตุ..." oninput="render()">
  </div>
</div>

<div id="summary-bar" class="summary-bar" style="display:none"></div>
<div id="output"></div>

<!-- LOGIN MODAL -->

    <h2>🔐 ล็อกอินทีมงาน</h2>

    <div class="login-actions">
      <button class="login-ok" id="loginOkBtn" onclick="doLogin()">เข้าสู่ระบบ</button>
      <button class="login-cancel" onclick="closeLogin()">ปิด</button>

  </div>
</div>

<!-- ADD / EDIT FORM MODAL -->
<div class="modal-overlay" id="formModal">
  <div class="form-box">
    <div class="form-head">
      <h2 id="formTitle">➕ เพิ่มลูกค้าใหม่</h2>
      <button class="x" onclick="closeForm()">×</button>
    </div>
    <div class="form-body">
      <input type="hidden" id="f_id">
      <div class="fgrid">
        <div class="field"><label>ชื่อลูกค้า <span class="req">*</span></label><input id="f_name" type="text" placeholder="ชื่อ / ชื่อเล่น"></div>
        <div class="field"><label>ช่องทางติดต่อ</label><input id="f_contact" type="text" placeholder="เบอร์ / LINE / FB"></div>
        <div class="field"><label>วันที่รับลูกค้า</label><input id="f_dateIn" type="text" placeholder="dd/mm/yyyy"><div class="hint">เว้นว่าง = วันนี้</div></div>
        <div class="field"><label>สัญชาติ</label><input id="f_nationality" type="text" placeholder="เช่น ไทย / จีน / อังกฤษ"></div>

        <div class="field"><label>ห้องนอนที่ต้องการ</label><input id="f_bedroom" type="text" placeholder="เช่น 2-3"></div>
        <div class="field"><label>ห้องน้ำที่ต้องการ</label><input id="f_bathroom" type="text" placeholder="เช่น 1-2"></div>
        <div class="field"><label>สัตว์เลี้ยง</label>
          <select id="f_pet"><option value=""></option><option>ไม่มี</option><option>มี - สุนัข</option><option>มี - แมว</option><option>มี - อื่นๆ</option></select>
        </div>
        <div class="field"><label>จำนวนผู้อาศัย</label><input id="f_occupants" type="text" placeholder="เช่น 2 คน"></div>

    <div class="form-foot">

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════
//  ใช้ Apps Script deployment เดียวกับ "แคทตาลอกเช่า" (AKfycbxu4qqx…)
//  redeploy ตัวนี้ครั้งเดียว → ได้ทั้งแคทตาลอก, ตารางโพส, และหน้าลูกค้านี้
// ═══════════════════════════════════════════════════════════════
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxu4qqxY58PGGIRBIfLWkCwj9TMIUdCB3DWg7xT2setU60hQsjDwisCplNVpka9UW-zFg/exec';
const STAFF_TOKEN_KEY = 'cust_staff_token';
// ★ ใส่ URL หน้าแคทตาลอกเช่า (GitHub Pages) เพื่อโชว์ปุ่มลิงก์กลับ — เว้น '' ถ้ายังไม่มี
const CATALOG_URL = '';

let STATUSES = ['กำลังหา', 'นัดชมทรัพย์', 'รอตัดสินใจ', 'ได้บ้านแล้ว', 'ยกเลิก'];
let DONE_STATUSES = ['ได้บ้านแล้ว', 'ยกเลิก'];
let customers = [];          // ข้อมูลลูกค้าทั้งหมดจากชีต
let activeFilter = 'pending';// ฟิลเตอร์เริ่มต้น = ลูกค้าที่ยังไม่ได้บ้าน

// ─── helpers ───────────────────────────────────────────────
function escapeHtml(s) {
  s = (s == null) ? '' : String(s);
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function escapeAttr(s) { return escapeHtml(s).replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
function todayShort() {
  const d = new Date(), p = function(n) { return String(n).padStart(2, '0'); };
  return p(d.getDate()) + '/' + p(d.getMonth() + 1) + '/' + d.getFullYear();
}
let _toastT;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(_toastT);
  _toastT = setTimeout(function() { t.classList.remove('show'); }, 2800);
}
function statusMeta(s) {
  switch (s) {
    case 'กำลังหา':     return { cls: 'st-find',  badge: 'b-find',  icon: '🔎' };
    case 'นัดชมทรัพย์': return { cls: 'st-visit', badge: 'b-visit', icon: '📅' };
    case 'รอตัดสินใจ':  return { cls: 'st-wait',  badge: 'b-wait',  icon: '⏳' };
    case 'ได้บ้านแล้ว':  return { cls: 'st-done',  badge: 'b-done',  icon: '✅' };
    case 'ยกเลิก':      return { cls: 'st-cancel',badge: 'b-cancel',icon: '✖️' };
    default:           return { cls: 'st-find',  badge: 'b-find',  icon: '•' };
  }
}
function isDone(s) { return DONE_STATUSES.indexOf(s) >= 0; }

// ─── API (ทุก action ใช้ GET + token + _t กัน cache ของ Google) ───
function apiUrl(action, paramsObj) {
  const token = getStaffToken();
  let url = SCRIPT_URL + '?action=' + encodeURIComponent(action) + '&token=' + encodeURIComponent(token);
  if (paramsObj) {
    Object.keys(paramsObj).forEach(function(k) {
      url += '&' + encodeURIComponent(k) + '=' + encodeURIComponent(paramsObj[k] == null ? '' : paramsObj[k]);
    });
  }
  url += '&_t=' + Date.now();
  return url;
}
async function api(action, paramsObj) {
  const resp = await fetch(apiUrl(action, paramsObj));
  const json = await resp.json();
  if (json && json.msg === 'unauthorized') {
    setStaffToken(''); updateAuthUI();
    showToast('🔒 เซสชันหมดอายุ — ล็อกอินใหม่'); openLogin();
    throw new Error('unauthorized');
  }
  return json;
}

// ─── LOAD ─────────────────────────────────────────────────
async function loadData() {
  if (!isLoggedIn()) { openLogin(); return; }
  const output = document.getElementById('output');
  document.getElementById('summary-bar').style.display = 'none';
  output.innerHTML = '<div class="loading">⏳ กำลังดึงข้อมูลลูกค้าจาก Google Sheet...</div>';
  try {
    const json = await api('custList');
    if (!json || !json.ok) throw new Error((json && json.msg) || 'โหลดไม่สำเร็จ');
    customers = json.data || [];
    if (json.statuses && json.statuses.length) STATUSES = json.statuses;
    if (json.doneStatuses && json.doneStatuses.length) DONE_STATUSES = json.doneStatuses;
    document.getElementById('toolbar').style.display = '';
    buildChips();
    render();
  } catch (err) {
    if (err.message === 'unauthorized') return;
    output.innerHTML = '<div class="error-box">❌ ' + escapeHtml(err.message) + '</div>';
    console.error(err);
  }
}

// ─── FILTER CHIPS ─────────────────────────────────────────
function countFor(filter) {
  return customers.filter(function(c) { return matchFilter(c, filter); }).length;
}
function matchFilter(c, filter) {
  if (filter === 'all') return true;
  if (filter === 'pending') return !isDone(c.status);
  return c.status === filter;
}
function buildChips() {
  const defs = [{ key: 'pending', label: '⏳ ยังไม่ได้บ้าน' }];
  STATUSES.forEach(function(s) { defs.push({ key: s, label: statusMeta(s).icon + ' ' + s }); });
  defs.push({ key: 'all', label: '📋 ทั้งหมด' });
  document.getElementById('chips').innerHTML = defs.map(function(d) {
    const active = (d.key === activeFilter) ? ' active' : '';
    return '<button class="chip' + active + '" onclick="setFilter(\'' + escapeAttr(d.key) + '\')">' +
      escapeHtml(d.label) + '<span class="cnt">' + countFor(d.key) + '</span></button>';
  }).join('');
}
function setFilter(f) { activeFilter = f; buildChips(); render(); }

// ─── RENDER ───────────────────────────────────────────────
function render() {
  if (!isLoggedIn()) return;
  const q = (document.getElementById('searchInput').value || '').trim().toLowerCase();
  let list = customers.filter(function(c) { return matchFilter(c, activeFilter); });
  if (q) {
    list = list.filter(function(c) {
      return [c.name, c.contact, c.nationality, c.area, c.note, c.id, c.propType, c.budget]
        .join(' ').toLowerCase().indexOf(q) >= 0;
    });
  }
  // เรียง: ยังไม่ปิดเคสก่อน, ใหม่สุด (รหัสมากสุด) ขึ้นก่อน
  list.sort(function(a, b) {
    const da = isDone(a.status) ? 1 : 0, db = isDone(b.status) ? 1 : 0;
    if (da !== db) return da - db;
    return (b.id || '').localeCompare(a.id || '', undefined, { numeric: true });
  });

  buildChips();
  const sb = document.getElementById('summary-bar');
  const pending = countFor('pending');
  sb.innerHTML = '👥 ลูกค้าทั้งหมด: <b>' + customers.length + '</b> &nbsp;|&nbsp; ' +
    '⏳ ยังไม่ได้บ้าน: <b>' + pending + '</b> &nbsp;|&nbsp; ' +
    '✅ ได้บ้านแล้ว: <b>' + countFor('ได้บ้านแล้ว') + '</b> &nbsp;|&nbsp; ' +
    'แสดง: <b>' + list.length + '</b> รายการ';
  sb.style.display = 'flex';

  const output = document.getElementById('output');
  if (!list.length) {
    output.innerHTML = '<div class="empty-state"><div class="ic">📭</div><p>ยังไม่มีลูกค้าในกลุ่มนี้</p>' +
      '<button class="lock-banner-btn" onclick="openAdd()">➕ เพิ่มลูกค้าใหม่</button></div>';
    return;
  }
  output.innerHTML = '<div class="card-grid">' + list.map(cardHtml).join('') + '</div>';
}

function kv(k, v) {
  if (!v) return '';
  return '<div class="kv"><span class="k">' + escapeHtml(k) + '</span><span class="v">' + escapeHtml(v) + '</span></div>';
}
function cardHtml(c) {
  const m = statusMeta(c.status);
  const id = escapeAttr(c.id);

  let kvs = '';
  kvs += kv('สัญชาติ', c.nationality);
  kvs += kv('งบประมาณ', c.budget);
  kvs += kv('ประเภท', c.propType);
  kvs += kv('ห้องนอน', c.bedroom);
  kvs += kv('ห้องน้ำ', c.bathroom);
  kvs += kv('สัตว์เลี้ยง', c.pet);
  kvs += kv('ผู้อาศัย', c.occupants);
  kvs += kv('เข้าอยู่', c.moveIn);
  kvs += kv('ผู้ดูแล', c.staff);
  if (c.area) kvs += '<div class="kv full"><span class="k">ทำเล / ใกล้</span><span class="v">' + escapeHtml(c.area) + '</span></div>';

  const follows = [c.follow1, c.follow2, c.follow3];
  const hasFollow = follows.some(function(f) { return f; });
  let followHtml = '<div class="follow-box"><div class="ftitle">📌 การติดตาม</div>';
  if (hasFollow) {
    follows.forEach(function(f, i) {
      if (f) followHtml += '<div class="follow-item"><span class="fn">#' + (i + 1) + '</span><span>' + escapeHtml(f) + '</span></div>';
    });
  } else {
    followHtml += '<div class="follow-empty">— ยังไม่มีการติดตาม —</div>';
  }
  followHtml += '</div>';

  const noteHtml = c.note ? '<div class="note-box">' + escapeHtml(c.note) + '</div>' : '';

  const doneBtn = isDone(c.status)
    ? '<button class="fb-edit" onclick="setStatus(\'' + id + '\',\'กำลังหา\')" title="กลับมาเป็นกำลังหา">↩️ เปิดเคสใหม่</button>'
    : '<button class="fb-done" onclick="setStatus(\'' + id + '\',\'ได้บ้านแล้ว\')" title="ปิดเคส: ลูกค้าได้บ้านแล้ว">✅ ได้บ้านแล้ว</button>';

  return '<div class="cust-card ' + m.cls + '" data-id="' + id + '">' +
    '<div class="cc-head">' +
      '<span class="st-badge ' + m.badge + '">' + m.icon + ' ' + escapeHtml(c.status || 'กำลังหา') + '</span>' +
      '<div class="cc-id">' + escapeHtml(c.id) + ' · รับ ' + escapeHtml(c.dateIn || '-') + '</div>' +
      '<div class="cc-name">' + escapeHtml(c.name || '(ไม่ระบุชื่อ)') + '</div>' +
      (c.contact ? '<div class="cc-contact">' + escapeHtml(c.contact) + '</div>' : '') +
    '</div>' +
    '<div class="cc-body"><div class="kv-grid">' + kvs + '</div></div>' +
    followHtml + noteHtml +
    '<div class="cc-foot">' +
      '<button class="fb-follow" onclick="quickFollow(\'' + id + '\')" title="บันทึกการติดตามครั้งใหม่">📞 +ติดตาม</button>' +
      '<button class="fb-edit" onclick="openEdit(\'' + id + '\')">✏️ แก้ไข</button>' +
      doneBtn +
      '<button class="fb-del" onclick="delCustomer(\'' + id + '\')">🗑️ ลบ</button>' +
    '</div>' +
  '</div>';
}

// ─── QUICK ACTIONS ────────────────────────────────────────
function findCust(id) {
  id = String(id).toUpperCase();
  return customers.find(function(c) { return String(c.id).toUpperCase() === id; });
}

// +ติดตาม: ใส่บันทึกลงช่องติดตามว่างช่องถัดไป (1→2→3) พร้อมวันที่วันนี้; ถ้าครบ 3 ช่อง → ต่อท้ายหมายเหตุ
async function quickFollow(id) {
  const c = findCust(id);
  if (!c) return;
  const note = prompt('บันทึกการติดตาม ' + (c.name || id) + ' (วันที่วันนี้จะถูกใส่ให้อัตโนมัติ):', '');
  if (note == null) return;
  const txt = (note || '').trim();
  if (!txt) return;
  const entry = todayShort() + ' - ' + txt;
  let field, val;
  if (!c.follow1)      { field = 'follow1'; val = entry; }
  else if (!c.follow2) { field = 'follow2'; val = entry; }
  else if (!c.follow3) { field = 'follow3'; val = entry; }
  else { field = 'note'; val = (c.note ? c.note + '\n' : '') + '[ติดตามเพิ่ม] ' + entry; }

  const params = { id: id }; params[field] = val;
  try {
    const j = await api('custUpdate', params);
    if (j && j.ok) {
      c[field] = val;
      render();
      showToast('📞 บันทึกการติดตามแล้ว');
    } else { showToast('⚠️ บันทึกไม่สำเร็จ: ' + ((j && j.msg) || '')); }
  } catch (e) { if (e.message !== 'unauthorized') showToast('⚠️ ' + e.message); }
}

async function setStatus(id, status) {
  const c = findCust(id);
  if (!c) return;
  if (status === 'ได้บ้านแล้ว' && !confirm('ยืนยันปิดเคส: ' + (c.name || id) + ' ได้บ้านแล้ว?')) return;
  try {
    const j = await api('custUpdate', { id: id, status: status });
    if (j && j.ok) {
      c.status = status;
      render();
      showToast(statusMeta(status).icon + ' เปลี่ยนสถานะเป็น "' + status + '" แล้ว');
    } else { showToast('⚠️ ไม่สำเร็จ: ' + ((j && j.msg) || '')); }
  } catch (e) { if (e.message !== 'unauthorized') showToast('⚠️ ' + e.message); }
}

async function delCustomer(id) {
  const c = findCust(id);
  if (!c) return;
  if (!confirm('ลบลูกค้า ' + (c.name || id) + ' (' + id + ') ออกจากฐานข้อมูล?\nลบแล้วกู้คืนไม่ได้')) return;
  try {
    const j = await api('custDelete', { id: id });
    if (j && j.ok) {
      customers = customers.filter(function(x) { return x.id !== c.id; });
      render();
      showToast('🗑️ ลบ ' + id + ' แล้ว');
    } else { showToast('⚠️ ลบไม่สำเร็จ: ' + ((j && j.msg) || '')); }
  } catch (e) { if (e.message !== 'unauthorized') showToast('⚠️ ' + e.message); }
}

// ─── ADD / EDIT FORM ──────────────────────────────────────
const FORM_FIELDS = ['name', 'contact', 'dateIn', 'nationality', 'budget', 'propType', 'area',
  'bedroom', 'bathroom', 'pet', 'occupants', 'moveIn', 'status', 'staff', 'follow1', 'follow2', 'follow3', 'note'];
function fillStatusSelect(sel) {
  sel.innerHTML = STATUSES.map(function(s) { return '<option>' + escapeHtml(s) + '</option>'; }).join('');
}
function openAdd() {
  if (!isLoggedIn()) { openLogin(); return; }
  document.getElementById('formTitle').textContent = '➕ เพิ่มลูกค้าใหม่';
  document.getElementById('f_id').value = '';
  fillStatusSelect(document.getElementById('f_status'));
  FORM_FIELDS.forEach(function(k) { const el = document.getElementById('f_' + k); if (el) el.value = ''; });
  document.getElementById('f_status').value = 'กำลังหา';
  document.getElementById('followFields').style.display = 'none';   // ตอนเพิ่ม ใช้ปุ่ม +ติดตาม ทีหลัง
  document.getElementById('formModal').classList.add('open');
  setTimeout(function() { document.getElementById('f_name').focus(); }, 50);
}
function openEdit(id) {
  const c = findCust(id);
  if (!c) return;
  document.getElementById('formTitle').textContent = '✏️ แก้ไข ' + c.id + ' — ' + (c.name || '');
  document.getElementById('f_id').value = c.id;
  fillStatusSelect(document.getElementById('f_status'));
  FORM_FIELDS.forEach(function(k) { const el = document.getElementById('f_' + k); if (el) el.value = c[k] || ''; });
  document.getElementById('followFields').style.display = '';       // แก้ไขช่องติดตามได้
  document.getElementById('formModal').classList.add('open');
  setTimeout(function() { document.getElementById('f_name').focus(); }, 50);
}
function closeForm() { document.getElementById('formModal').classList.remove('open'); }

async function submitForm() {
  const id = document.getElementById('f_id').value;
  const data = {};
  FORM_FIELDS.forEach(function(k) { const el = document.getElementById('f_' + k); if (el) data[k] = el.value.trim(); });
  if (!data.name) { showToast('⚠️ กรุณาใส่ชื่อลูกค้า'); document.getElementById('f_name').focus(); return; }

  const saveBtn = document.getElementById('saveBtn');
  saveBtn.disabled = true; saveBtn.textContent = '⏳ กำลังบันทึก...';
  try {
    if (id) {
      const j = await api('custUpdate', Object.assign({ id: id }, data));
      if (j && j.ok) {
        const c = findCust(id);
        if (c) FORM_FIELDS.forEach(function(k) { c[k] = data[k]; });
        closeForm(); render(); showToast('💾 บันทึกการแก้ไขแล้ว');
      } else { showToast('⚠️ ไม่สำเร็จ: ' + ((j && j.msg) || '')); }
    } else {
      const j = await api('custAdd', data);
      if (j && j.ok) {
        closeForm();
        showToast('✅ เพิ่มลูกค้า ' + j.id + ' แล้ว');
        await loadData();
      } else { showToast('⚠️ เพิ่มไม่สำเร็จ: ' + ((j && j.msg) || '')); }
    }
  } catch (e) {
    if (e.message !== 'unauthorized') showToast('⚠️ ' + e.message);
  } finally {
    saveBtn.disabled = false; saveBtn.textContent = '💾 บันทึก';
  }
}

// ─── LOGIN (เหมือนหน้าตารางโพส: ตรวจรหัสกับ ?action=caption&token=) ───
function getStaffToken() { try { return sessionStorage.getItem(STAFF_TOKEN_KEY) || ''; } catch (e) { return ''; } }
function setStaffToken(t) { try { if (t) sessionStorage.setItem(STAFF_TOKEN_KEY, t); else sessionStorage.removeItem(STAFF_TOKEN_KEY); } catch (e) {} }
function isLoggedIn() { return !!getStaffToken(); }

function updateAuthUI() {
  const inn = isLoggedIn();
  const btn = document.getElementById('authBtn');
  if (btn) btn.textContent = inn ? '⭐ ทีมงาน (ออก)' : '🔒 ล็อกอินทีมงาน';
  document.getElementById('lockBanner').style.display = inn ? 'none' : '';
  document.getElementById('addBtn').style.display = inn ? '' : 'none';
  if (!inn) {
    document.getElementById('toolbar').style.display = 'none';
    document.getElementById('summary-bar').style.display = 'none';
    document.getElementById('output').innerHTML = '';
  }
  const cl = document.getElementById('catalogLink');
  if (cl && CATALOG_URL) { cl.href = CATALOG_URL; cl.style.display = ''; }
}
function authBtnClick() { if (isLoggedIn()) { if (confirm('ออกจากระบบทีมงาน?')) logout(); } else openLogin(); }
function logout() { setStaffToken(''); customers = []; updateAuthUI(); showToast('👋 ออกจากระบบแล้ว'); }

function openLogin() {
  const mdl = document.getElementById('loginModal');
  document.getElementById('loginErr').textContent = '';
  document.getElementById('loginPw').value = '';
  mdl.classList.add('open');
  setTimeout(function() { document.getElementById('loginPw').focus(); }, 50);
}
function closeLogin() { document.getElementById('loginModal').classList.remove('open'); }

async function doLogin() {
  const inp = document.getElementById('loginPw');
  const errEl = document.getElementById('loginErr');
  const okBtn = document.getElementById('loginOkBtn');
  const pw = (inp.value || '').trim();
  if (!pw) { errEl.textContent = 'กรุณาใส่รหัส'; return; }
  errEl.textContent = '⏳ กำลังตรวจสอบ...';
  okBtn.disabled = true;
  try {
    const j = await (await fetch(SCRIPT_URL + '?action=caption&token=' + encodeURIComponent(pw) + '&_t=' + Date.now())).json();
    if (j && j.msg === 'unauthorized') {
      errEl.textContent = '❌ รหัสไม่ถูกต้อง';
    } else {
      setStaffToken(pw);
      updateAuthUI();
      closeLogin();
      showToast('✅ เข้าสู่ระบบสำเร็จ');
      loadData();
    }
  } catch (e) {
    errEl.textContent = '⚠️ เชื่อมต่อไม่ได้: ' + e.message;
  } finally {
    okBtn.disabled = false;
  }
}

document.addEventListener('keydown', function(e) { if (e.key === 'Escape') { closeLogin(); closeForm(); } });

function init() {
  updateAuthUI();
  if (isLoggedIn()) loadData();
  else openLogin();
}
if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
else init();
</script>
